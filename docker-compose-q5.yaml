services:
  client0:
    container_name: client
    build:
      context: ./src
      dockerfile: client/Dockerfile
    depends_on:
      filter_q5_amount_0:
        condition: service_started
      filter_q5_amount_1:
        condition: service_started
    environment:
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - INPUT_FILE=/datasets/HI-Medium_Trans.csv
    - OUTPUT_FILE=/output/client0/output.csv
    - BATCH_SIZE=10000
    volumes:
    - ./datasets:/datasets
    - ./output:/output
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq: &id001
        condition: service_healthy
    environment:
    - INPUT_QUEUE=filter_q5_fmt_queue
    - MOM_HOST=rabbitmq
    - OUTPUT_QUEUE=results_queue
    - NUM_EXPECTED_EOFS=1
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - BATCH_SIZE=10000
  filter_q5_fmt_0:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_q5_fmt_0
    depends_on:
      rabbitmq: *id001
      gateway:
        condition: service_started
    environment:
    - QUERY_NUMBER=5
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_q5_fmt_queue
    - OUTPUT_QUEUES=converter_queue
    - FILTER_AMOUNT=7
    - GE_DATE=2022-09-01
    - LE_DATE=2022-09-05
    - PAY_FMTS=Wire,ACH
    - BATCH_SIZE=10000
  filter_q5_fmt_1:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_q5_fmt_1
    depends_on:
      rabbitmq: *id001
      gateway:
        condition: service_started
    environment:
    - QUERY_NUMBER=5
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_q5_fmt_queue
    - OUTPUT_QUEUES=converter_queue
    - FILTER_AMOUNT=7
    - GE_DATE=2022-09-01
    - LE_DATE=2022-09-05
    - PAY_FMTS=Wire,ACH
    - BATCH_SIZE=10000
  filter_q5_fmt_2:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_q5_fmt_2
    depends_on:
      rabbitmq: *id001
      gateway:
        condition: service_started
    environment:
    - QUERY_NUMBER=5
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_q5_fmt_queue
    - OUTPUT_QUEUES=converter_queue
    - FILTER_AMOUNT=7
    - GE_DATE=2022-09-01
    - LE_DATE=2022-09-05
    - PAY_FMTS=Wire,ACH
    - BATCH_SIZE=10000
  filter_q5_fmt_3:
    build:
      context: ./src/
