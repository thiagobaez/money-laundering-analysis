services:
  client0:
    container_name: client
    build:
      context: ./src
      dockerfile: client/Dockerfile
    depends_on:
    - gateway
    environment:
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - INPUT_FILE=/datasets/HI-Small_Trans.csv.gz
    - OUTPUT_FILE=/output/client0/output.csv
    volumes:
    - ./datasets:/datasets
    - ./output:/output
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - INPUT_QUEUE=filter_q5_fmt_queue
    - MOM_HOST=rabbitmq
    - OUTPUT_QUEUE=results_queue
    - NUM_EXPECTED_EOFS=1
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - SEND_RATE_LIMIT=0.001
  filter_q5_fmt_0:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_q5_fmt_0
    depends_on:
    - gateway
    environment:
    - QUERY_NUMBER=5
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_q5_fmt_queue
    - OUTPUT_QUEUE=converter_queue
    - FILTER_AMOUNT=2
    - GE_DATE=2022-09-01
    - LE_DATE=2022-09-05
    - PAY_FMTS=Wire,ACH
  filter_q5_fmt_1:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_q5_fmt_1
    depends_on:
    - gateway
    environment:
    - QUERY_NUMBER=5
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_q5_fmt_queue
    - OUTPUT_QUEUE=converter_queue
    - FILTER_AMOUNT=2
    - GE_DATE=2022-09-01
    - LE_DATE=2022-09-05
    - PAY_FMTS=Wire,ACH
  converter_0:
    build:
      context: ./src/
      dockerfile: business/common_workers/converter/Dockerfile
      network: host
    container_name: converter_0
    depends_on: &id001
    - filter_q5_fmt_0
    - filter_q5_fmt_1
    environment:
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=converter_queue
    - OUTPUT_QUEUE=filter_q5_amount_queue
    - CONVERTER_AMOUNT=2
    - FRANKFURTER_BASE=https://api.frankfurter.dev/v2
  converter_1:
    build:
      context: ./src/
      dockerfile: business/common_workers/converter/Dockerfile
      network: host
    container_name: converter_1
    depends_on: *id001
    environment:
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=converter_queue
    - OUTPUT_QUEUE=filter_q5_amount_queue
    - CONVERTER_AMOUNT=2
    - FRANKFURTER_BASE=https://api.frankfurter.dev/v2
  filter_q5_amount_0:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_q5_amount_0
    depends_on: &id002
    - converter_0
    - converter_1
    environment:
    - QUERY_NUMBER=5
    - ADD_QUERY_ID=True
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_q5_amount_queue
    - OUTPUT_QUEUE=results_queue
    - FILTER_AMOUNT=2
    - MAX_AMOUNT=1.0
  filter_q5_amount_1:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_q5_amount_1
    depends_on: *id002
    environment:
    - QUERY_NUMBER=5
    - ADD_QUERY_ID=True
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_q5_amount_queue
    - OUTPUT_QUEUE=results_queue
    - FILTER_AMOUNT=2
    - MAX_AMOUNT=1.0
  rabbitmq:
    build:
      context: ./src/
      dockerfile: rabbitmq/Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
