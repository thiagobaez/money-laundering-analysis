services:
  client0:
    container_name: client
    build:
      context: ./src
      dockerfile: client/Dockerfile
    depends_on:
    - gateway
    environment:
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - INPUT_FILE=/datasets/Hipersmall_Trans.csv
    - OUTPUT_FILE=/output/client0/output.csv
    volumes:
    - ./datasets:/datasets
    - ./output:/output
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq: &id001
        condition: service_healthy
    environment:
    - INPUT_QUEUE=filter_usd_queue
    - MOM_HOST=rabbitmq
    - OUTPUT_QUEUE=results_queue
    - NUM_EXPECTED_EOFS=1
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - SEND_RATE_LIMIT=0.001
  filter_usd:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_usd
    depends_on:
      rabbitmq: *id001
      gateway:
        condition: service_started
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_usd_queue
    - OUTPUT_QUEUES=q3_split_queue
    - FILTER_AMOUNT=1
    - USD_ONLY=True
  split_date:
    build:
      context: ./src/
      dockerfile: business/query3/split_date/Dockerfile
    container_name: split_date
    depends_on:
      rabbitmq: *id001
      filter_usd:
        condition: service_started
      avg_0:
        condition: service_started
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=q3_split_queue
    - FIRST_PERIOD_EXCHANGE=first_period_exchange
    - FIRST_PERIOD_ROUTING_KEYS=avg_0
    - SECOND_PERIOD_QUEUE=second_period_queue
    - FIRST_PERIOD_GE=2022-09-01
    - FIRST_PERIOD_LE=2022-09-05
    - SECOND_PERIOD_GE=2022-09-06
    - SECOND_PERIOD_LE=2022-09-15
    - SPLIT_AMOUNT=1
  avg_0:
    build:
      context: ./src/
      dockerfile: business/query3/avg/Dockerfile
    container_name: avg_0
    depends_on:
      rabbitmq: *id001
      avg_joiner_0:
        condition: service_started
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_EXCHANGE_NAME=first_period_exchange
    - INPUT_ROUTING_KEYS=avg_0
    - OUTPUT_EXCHANGE=avg_exchange
    - OUTPUT_ROUTING_KEYS=avg_joiner_0
    - AVG_AMOUNT=1
  avg_joiner_0:
    build:
      context: ./src/
      dockerfile: business/query3/avg_joiner/Dockerfile
    container_name: avg_joiner_0
    depends_on:
      rabbitmq: *id001
    volumes:
    - ./src/business/query3/spill_to_disk:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - SECOND_PERIOD_QUEUE=second_period_queue
    - AVG_EXCHANGE=avg_exchange
    - AVG_ROUTING_KEY=avg_joiner_0
    - OUTPUT_QUEUE=results_queue
    - AVG_JOINER_AMOUNT=1
  rabbitmq:
    build:
      context: ./src/
      dockerfile: rabbitmq/Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
