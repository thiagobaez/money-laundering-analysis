services:
  client0:
    container_name: client
    build:
      context: ./src
      dockerfile: client/Dockerfile
    depends_on:
    - gateway
    environment:
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - INPUT_FILE=/datasets/HI-Medium_Trans.csv
    - OUTPUT_FILE=/output/client0/output.csv
    - BATCH_SIZE=1000
    volumes:
    - ./datasets:/datasets
    - ./output:/output
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq: &id001
        condition: service_healthy
    environment:
    - INPUT_QUEUE=filter_usd_queue
    - MOM_HOST=rabbitmq
    - OUTPUT_QUEUE=results_queue
    - NUM_EXPECTED_EOFS=1
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - BATCH_SIZE=1000
    - AVG_JOINER_AMOUNT=5
  filter_usd_0:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_usd_0
    depends_on:
      rabbitmq: *id001
      gateway:
        condition: service_started
    volumes:
    - ./data/filter_usd_0:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_usd_queue
    - OUTPUT_QUEUES=q3_split_queue
    - FILTER_AMOUNT=3
    - USD_ONLY=True
    - BATCH_SIZE=1000
    - CONTAINER_NAME=filter_usd_0
  filter_usd_1:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_usd_1
    depends_on:
      rabbitmq: *id001
      gateway:
        condition: service_started
    volumes:
    - ./data/filter_usd_1:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_usd_queue
    - OUTPUT_QUEUES=q3_split_queue
    - FILTER_AMOUNT=3
    - USD_ONLY=True
    - BATCH_SIZE=1000
    - CONTAINER_NAME=filter_usd_1
  filter_usd_2:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_usd_2
    depends_on:
      rabbitmq: *id001
      gateway:
        condition: service_started
    volumes:
    - ./data/filter_usd_2:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=filter_usd_queue
    - OUTPUT_QUEUES=q3_split_queue
    - FILTER_AMOUNT=3
    - USD_ONLY=True
    - BATCH_SIZE=1000
    - CONTAINER_NAME=filter_usd_2
  avg_joiner_0:
    build:
      context: ./src/
      dockerfile: business/query3/avg_joiner/Dockerfile
    container_name: avg_joiner_0
    depends_on:
      rabbitmq: *id001
    volumes:
    - ./src/business/query3/spill_to_disk:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - SECOND_PERIOD_QUEUE=second_period_queue
    - AVG_QUEUE=avg_joiner_0
    - OUTPUT_QUEUE=results_queue
    - AVG_JOINER_AMOUNT=5
    - AVG_AMOUNT=2
    - DATA_DIR=/data/joiner_0
    - BATCH_SIZE=1000
    - CONTAINER_NAME=avg_joiner_0
  avg_joiner_1:
    build:
      context: ./src/
      dockerfile: business/query3/avg_joiner/Dockerfile
    container_name: avg_joiner_1
    depends_on:
      rabbitmq: *id001
    volumes:
    - ./src/business/query3/spill_to_disk:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - SECOND_PERIOD_QUEUE=second_period_queue
    - AVG_QUEUE=avg_joiner_1
    - OUTPUT_QUEUE=results_queue
    - AVG_JOINER_AMOUNT=5
    - AVG_AMOUNT=2
    - DATA_DIR=/data/joiner_1
    - BATCH_SIZE=1000
    - CONTAINER_NAME=avg_joiner_1
  avg_joiner_2:
    build:
      context: ./src/
      dockerfile: business/query3/avg_joiner/Dockerfile
    container_name: avg_joiner_2
    depends_on:
      rabbitmq: *id001
    volumes:
    - ./src/business/query3/spill_to_disk:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - SECOND_PERIOD_QUEUE=second_period_queue
    - AVG_QUEUE=avg_joiner_2
    - OUTPUT_QUEUE=results_queue
    - AVG_JOINER_AMOUNT=5
    - AVG_AMOUNT=2
    - DATA_DIR=/data/joiner_2
    - BATCH_SIZE=1000
    - CONTAINER_NAME=avg_joiner_2
  avg_joiner_3:
    build:
      context: ./src/
      dockerfile: business/query3/avg_joiner/Dockerfile
    container_name: avg_joiner_3
    depends_on:
      rabbitmq: *id001
    volumes:
    - ./src/business/query3/spill_to_disk:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - SECOND_PERIOD_QUEUE=second_period_queue
    - AVG_QUEUE=avg_joiner_3
    - OUTPUT_QUEUE=results_queue
    - AVG_JOINER_AMOUNT=5
    - AVG_AMOUNT=2
    - DATA_DIR=/data/joiner_3
    - BATCH_SIZE=1000
    - CONTAINER_NAME=avg_joiner_3
  avg_joiner_4:
    build:
      context: ./src/
      dockerfile: business/query3/avg_joiner/Dockerfile
    container_name: avg_joiner_4
    depends_on:
      rabbitmq: *id001
    volumes:
    - ./src/business/query3/spill_to_disk:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - SECOND_PERIOD_QUEUE=second_period_queue
    - AVG_QUEUE=avg_joiner_4
    - OUTPUT_QUEUE=results_queue
    - AVG_JOINER_AMOUNT=5
    - AVG_AMOUNT=2
    - DATA_DIR=/data/joiner_4
    - BATCH_SIZE=1000
    - CONTAINER_NAME=avg_joiner_4
  avg_0:
    build:
      context: ./src/
      dockerfile: business/query3/avg/Dockerfile
    container_name: avg_0
    depends_on:
      rabbitmq: *id001
      avg_joiner_0: &id002
        condition: service_started
      avg_joiner_1: &id003
        condition: service_started
      avg_joiner_2: &id004
        condition: service_started
      avg_joiner_3: &id005
        condition: service_started
      avg_joiner_4: &id006
        condition: service_started
    volumes:
    - ./data/avg_0:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=avg_queue_0
    - OUTPUT_QUEUES=avg_joiner_0,avg_joiner_1,avg_joiner_2,avg_joiner_3,avg_joiner_4
    - AVG_AMOUNT=2
    - CONTAINER_NAME=avg_0
  avg_1:
    build:
      context: ./src/
      dockerfile: business/query3/avg/Dockerfile
    container_name: avg_1
    depends_on:
      rabbitmq: *id001
      avg_joiner_0: *id002
      avg_joiner_1: *id003
      avg_joiner_2: *id004
      avg_joiner_3: *id005
      avg_joiner_4: *id006
    volumes:
    - ./data/avg_1:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=avg_queue_1
    - OUTPUT_QUEUES=avg_joiner_0,avg_joiner_1,avg_joiner_2,avg_joiner_3,avg_joiner_4
    - AVG_AMOUNT=2
    - CONTAINER_NAME=avg_1
  split_date_0:
    build:
      context: ./src/
      dockerfile: business/query3/split_date/Dockerfile
    container_name: split_date_0
    depends_on:
      rabbitmq: *id001
      filter_usd_0: &id007
        condition: service_started
      filter_usd_1: &id008
        condition: service_started
      filter_usd_2: &id009
        condition: service_started
      avg_0: &id010
        condition: service_started
      avg_1: &id011
        condition: service_started
    volumes:
    - ./data/split_date_0:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=q3_split_queue
    - FIRST_PERIOD_QUEUES=avg_queue_0,avg_queue_1
    - SECOND_PERIOD_QUEUE=second_period_queue
    - FIRST_PERIOD_GE=2022-09-01
    - FIRST_PERIOD_LE=2022-09-05
    - SECOND_PERIOD_GE=2022-09-06
    - SECOND_PERIOD_LE=2022-09-14
    - SPLIT_AMOUNT=3
    - BATCH_SIZE=1000
    - CONTAINER_NAME=split_date_0
  split_date_1:
    build:
      context: ./src/
      dockerfile: business/query3/split_date/Dockerfile
    container_name: split_date_1
    depends_on:
      rabbitmq: *id001
      filter_usd_0: *id007
      filter_usd_1: *id008
      filter_usd_2: *id009
      avg_0: *id010
      avg_1: *id011
    volumes:
    - ./data/split_date_1:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=q3_split_queue
    - FIRST_PERIOD_QUEUES=avg_queue_0,avg_queue_1
    - SECOND_PERIOD_QUEUE=second_period_queue
    - FIRST_PERIOD_GE=2022-09-01
    - FIRST_PERIOD_LE=2022-09-05
    - SECOND_PERIOD_GE=2022-09-06
    - SECOND_PERIOD_LE=2022-09-14
    - SPLIT_AMOUNT=3
    - BATCH_SIZE=1000
    - CONTAINER_NAME=split_date_1
  split_date_2:
    build:
      context: ./src/
      dockerfile: business/query3/split_date/Dockerfile
    container_name: split_date_2
    depends_on:
      rabbitmq: *id001
      filter_usd_0: *id007
      filter_usd_1: *id008
      filter_usd_2: *id009
      avg_0: *id010
      avg_1: *id011
    volumes:
    - ./data/split_date_2:/data
    environment:
    - QUERY_NUMBER=3
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=q3_split_queue
    - FIRST_PERIOD_QUEUES=avg_queue_0,avg_queue_1
    - SECOND_PERIOD_QUEUE=second_period_queue
    - FIRST_PERIOD_GE=2022-09-01
    - FIRST_PERIOD_LE=2022-09-05
    - SECOND_PERIOD_GE=2022-09-06
    - SECOND_PERIOD_LE=2022-09-14
    - SPLIT_AMOUNT=3
    - BATCH_SIZE=1000
    - CONTAINER_NAME=split_date_2
  rabbitmq:
    build:
      context: ./src/
      dockerfile: rabbitmq/Dockerfile
    container_name: rabbitmq
    volumes:
    - ./data/rabbitmq:/var/lib/rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
  watchdog:
    build:
      context: ./src/
      dockerfile: watchdog/Dockerfile
    container_name: watchdog
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - MOM_HOST=rabbitmq
    - HEARTBEAT_TIMEOUT=10
    depends_on:
      rabbitmq: *id001
  chaos_monkey:
      build:
        context: ./src/
        dockerfile: chaos_monkey/Dockerfile
      container_name: chaos_monkey
      volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      environment:
      - KILL_INTERVAL=30
      - EXCLUDE_CONTAINERS=rabbitmq,chaos_monkey,watchdog,gateway,client
      depends_on:
        rabbitmq: *id001