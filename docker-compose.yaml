services:
  client0:
    container_name: client
    build:
      context: ./src
      dockerfile: client/Dockerfile
    depends_on:
      - gateway
    environment:
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - INPUT_FILE=/datasets/cortito.csv
    - OUTPUT_FILE=/output/client0/output.csv
    volumes:
    - ./datasets:/datasets
    - ./output:/output
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - INPUT_EXCHANGE_NAME=input_gateway_exchange
    - INPUT_ROUTING_KEYS=filter_usd,q5_filter
    - MOM_HOST=rabbitmq
    - OUTPUT_EXCHANGE_NAME=output_gateway_exchange
    - OUTPUT_ROUTING_KEYS=filter_amount_q1,q5_filter
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678

  filter_usd:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_usd
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - ID=1
    - QUERY_NUMBER=1
    - INPUT_EXCHANGE_NAME=input_gateway_exchange
    - INPUT_ROUTING_KEYS=filter_usd
    - MOM_HOST=rabbitmq
    - OUTPUT_EXCHANGE_NAME=filter_usd_exchange
    - OUTPUT_ROUTING_KEYS=filter_amount_q1,filter_per_date_q4
    - USD_ONLY=True

  filter_amount_q1:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_amount_q1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - ID=1
    - QUERY_NUMBER=1
    - INPUT_EXCHANGE_NAME=filter_usd_exchange
    - INPUT_ROUTING_KEYS=filter_amount_q1
    - MOM_HOST=rabbitmq
    - OUTPUT_EXCHANGE_NAME=output_gateway_exchange
    - OUTPUT_ROUTING_KEYS=filter_amount_q1,filter_per_date_q4
    - MAX_AMOUNT=50
    - ADD_QUERY_ID=True

  filter_date_q4:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_date_q4
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - ID=1
    - QUERY_NUMBER=4
    - GE_DATE=2022-09-01
    - LE_DATE=2022-09-05
    - INPUT_EXCHANGE_NAME=filter_usd_exchange
    - INPUT_ROUTING_KEYS=filter_per_date_q4
    - OUTPUT_QUEUE=tx_usd_date
    - MOM_HOST=rabbitmq
  
  split_q4:
    build:
      context: ./src/
      dockerfile: business/common_workers/split/Dockerfile
    container_name: split_q4
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - ID=1
    - QUERY_NUMBER=4
    - INPUT_QUEUE=tx_usd_date
    - EXCHANGE_NAME=split_q4_exchange
    - ORIGIN_ROUTING_KEYS=tx_origin_1
    - DESTINATION_ROUTING_KEYS=tx_destination_1
    - MOM_HOST=rabbitmq

  q5_filter:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: q5_filter
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - ID=1
    - QUERY_NUMBER=5
    - GE_DATE=2022-09-01
    - LE_DATE=2022-09-05
    - PAY_FMTS=Wire,ACH
    - INPUT_EXCHANGE_NAME=input_gateway_exchange
    - INPUT_ROUTING_KEYS=q5_filter
    - OUTPUT_EXCHANGE_NAME=output_gateway_exchange
    - OUTPUT_ROUTING_KEYS=q5_filter
    - MOM_HOST=rabbitmq
    - ADD_QUERY_ID=True
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672