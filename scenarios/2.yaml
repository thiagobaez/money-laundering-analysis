services:
  client0:
    container_name: client
    build:
      context: ./src
      dockerfile: client/Dockerfile
    depends_on:
      - filter_usd
    environment:
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - INPUT_FILE=/datasets/cortito.csv
    - OUTPUT_FILE=/output/client0/output.csv
    volumes:
    - ./datasets:/datasets
    - ./output:/output

  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - INPUT_EXCHANGE_NAME=input_gateway_exchange
    - INPUT_ROUTING_KEYS=filter_usd,q5_filter
    - MOM_HOST=rabbitmq
    - OUTPUT_QUEUE=results_queue
    - NUM_EXPECTED_EOFS=3
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678

  filter_usd:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: filter_usd
    depends_on:
      - q1_filter_amount
      - q4_filter_date
      - q5_filter
    environment:
    - QUERY_NUMBER=1
    - INPUT_EXCHANGE_NAME=input_gateway_exchange
    - INPUT_ROUTING_KEYS=filter_usd
    - MOM_HOST=rabbitmq
    - OUTPUT_EXCHANGE_NAME=filter_usd_exchange
    - OUTPUT_ROUTING_KEYS=q1_filter_amount,q4_filter_date
    - USD_ONLY=True

  q1_filter_amount:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: q1_filter_amount
    depends_on:
      - gateway
    environment:
    - QUERY_NUMBER=1
    - MOM_HOST=rabbitmq
    - INPUT_EXCHANGE_NAME=filter_usd_exchange
    - INPUT_ROUTING_KEYS=q1_filter_amount
    - OUTPUT_QUEUE=results_queue
    - MAX_AMOUNT=50
    - ADD_QUERY_ID=True

  q4_filter_date:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: q4_filter_date
    depends_on:
      - q4_split_1
      - q4_split_2
      - q4_split_3
    environment:
    - ADD_QUERY_ID=True
    - QUERY_NUMBER=4
    - GE_DATE=2022-09-01
    - LE_DATE=2022-09-05
    - INPUT_EXCHANGE_NAME=filter_usd_exchange
    - INPUT_ROUTING_KEYS=q4_filter_date
    - OUTPUT_QUEUE=tx_usd_date
    - MOM_HOST=rabbitmq

  q4_split_1:
    build:
      context: ./src/
      dockerfile: business/common_workers/split/Dockerfile
    container_name: q4_split_1
    depends_on:
      - q4_og_detect_1
      - q4_og_detect_2
      - q4_og_detect_3
      - q4_dt_detect_1
      - q4_dt_detect_2
      - q4_dt_detect_3
    environment:
    - QUERY_NUMBER=4
    - INPUT_QUEUE=tx_usd_date
    - EXCHANGE_NAME=q4_split_exchange
    - ORIGIN_ROUTING_KEYS=tx_origin_1,tx_origin_2,tx_origin_3
    - DESTINATION_ROUTING_KEYS=tx_destination_1,tx_destination_2,tx_destination_3
    - MOM_HOST=rabbitmq
    - SPLIT_AMOUNT=3

  q4_split_2:
    build:
      context: ./src/
      dockerfile: business/common_workers/split/Dockerfile
    container_name: q4_split_2
    depends_on:
      - q4_og_detect_1
      - q4_og_detect_2
      - q4_og_detect_3
      - q4_dt_detect_1
      - q4_dt_detect_2
      - q4_dt_detect_3
    environment:
    - QUERY_NUMBER=4
    - INPUT_QUEUE=tx_usd_date
    - EXCHANGE_NAME=q4_split_exchange
    - ORIGIN_ROUTING_KEYS=tx_origin_1,tx_origin_2,tx_origin_3
    - DESTINATION_ROUTING_KEYS=tx_destination_1,tx_destination_2,tx_destination_3
    - MOM_HOST=rabbitmq
    - SPLIT_AMOUNT=3

  q4_split_3:
    build:
      context: ./src/
      dockerfile: business/common_workers/split/Dockerfile
    container_name: q4_split_3
    depends_on:
      - q4_og_detect_1
      - q4_og_detect_2
      - q4_og_detect_3
      - q4_dt_detect_1
      - q4_dt_detect_2
      - q4_dt_detect_3
    environment:
    - QUERY_NUMBER=4
    - INPUT_QUEUE=tx_usd_date
    - EXCHANGE_NAME=q4_split_exchange
    - ORIGIN_ROUTING_KEYS=tx_origin_1,tx_origin_2,tx_origin_3
    - DESTINATION_ROUTING_KEYS=tx_destination_1,tx_destination_2,tx_destination_3
    - MOM_HOST=rabbitmq
    - SPLIT_AMOUNT=3

  q4_og_detect_1:
    build:
      context: ./src/
      dockerfile: business/query4/og_detect/Dockerfile
    container_name: q4_og_detect_1
    depends_on:
      - q4_sg_detect
    environment:
    - QUERY_NUMBER=4
    - MOM_HOST=rabbitmq
    - EXCHANGE_NAME=q4_split_exchange
    - ORIGIN_ROUTING_KEY=tx_origin_1
    - OUTPUT_QUEUE=origin_more_5dest
    - MIN_DESTINATIONS=5
    - SPLIT_AMOUNT=3

  q4_og_detect_2:
    build:
      context: ./src/
      dockerfile: business/query4/og_detect/Dockerfile
    container_name: q4_og_detect_2
    depends_on:
      - q4_sg_detect
    environment:
    - QUERY_NUMBER=4
    - MOM_HOST=rabbitmq
    - EXCHANGE_NAME=q4_split_exchange
    - ORIGIN_ROUTING_KEY=tx_origin_2
    - OUTPUT_QUEUE=origin_more_5dest
    - MIN_DESTINATIONS=5
    - SPLIT_AMOUNT=3

  q4_og_detect_3:
    build:
      context: ./src/
      dockerfile: business/query4/og_detect/Dockerfile
    container_name: q4_og_detect_3
    depends_on:
      - q4_sg_detect
    environment:
    - QUERY_NUMBER=4
    - MOM_HOST=rabbitmq
    - EXCHANGE_NAME=q4_split_exchange
    - ORIGIN_ROUTING_KEY=tx_origin_3
    - OUTPUT_QUEUE=origin_more_5dest
    - MIN_DESTINATIONS=5
    - SPLIT_AMOUNT=3

  q4_dt_detect_1:
    build:
      context: ./src/
      dockerfile: business/query4/dt_detect/Dockerfile
    container_name: q4_dt_detect_1
    depends_on:
      - q4_sg_detect
    environment:
    - QUERY_NUMBER=4
    - MOM_HOST=rabbitmq
    - EXCHANGE_NAME=q4_split_exchange
    - ORIGIN_ROUTING_KEY=tx_destination_1
    - OUTPUT_QUEUE=destination_more_5origins
    - MIN_ORIGINS=5
    - SPLIT_AMOUNT=3

  q4_dt_detect_2:
    build:
      context: ./src/
      dockerfile: business/query4/dt_detect/Dockerfile
    container_name: q4_dt_detect_2
    depends_on:
      - q4_sg_detect
    environment:
    - QUERY_NUMBER=4
    - MOM_HOST=rabbitmq
    - EXCHANGE_NAME=q4_split_exchange
    - ORIGIN_ROUTING_KEY=tx_destination_2
    - OUTPUT_QUEUE=destination_more_5origins
    - MIN_ORIGINS=5
    - SPLIT_AMOUNT=3

  q4_dt_detect_3:
    build:
      context: ./src/
      dockerfile: business/query4/dt_detect/Dockerfile
    container_name: q4_dt_detect_3
    depends_on:
      - q4_sg_detect
    environment:
    - QUERY_NUMBER=4
    - MOM_HOST=rabbitmq
    - EXCHANGE_NAME=q4_split_exchange
    - ORIGIN_ROUTING_KEY=tx_destination_3
    - OUTPUT_QUEUE=destination_more_5origins
    - MIN_ORIGINS=5
    - SPLIT_AMOUNT=3

  q4_sg_detect:
    build:
      context: ./src/
      dockerfile: business/query4/sg_detect/Dockerfile
    container_name: q4_sg_detect
    depends_on:
      - gateway
    environment:
    - QUERY_NUMBER=4
    - MOM_HOST=rabbitmq
    - ORIGINS_QUEUE=origin_more_5dest
    - DESTINATIONS_QUEUE=destination_more_5origins
    - OUTPUT_QUEUE=results_queue
    - MIN_COMMON=5
    - NUM_OG_WORKERS=3
    - NUM_DT_WORKERS=3

  q5_filter:
    build:
      context: ./src/
      dockerfile: business/common_workers/filter/Dockerfile
    container_name: q5_filter
    depends_on:
      - gateway
    environment:
    - ID=1
    - QUERY_NUMBER=5
    - ADD_QUERY_ID=True
    - MOM_HOST=rabbitmq
    - INPUT_EXCHANGE_NAME=input_gateway_exchange
    - INPUT_ROUTING_KEYS=q5_filter
    - OUTPUT_QUEUE=results_queue
    - GE_DATE=2022-09-01
    - LE_DATE=2022-09-05
    - PAY_FMTS=Wire,ACH

  rabbitmq:
    build:
      context: ./src/
      dockerfile: rabbitmq/Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
